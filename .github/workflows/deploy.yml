name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy build to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # React Router v7 emits the static site to build/client (not dist/)
          local-dir: ./build/client/
          server-dir: /public_html/
          # No dangerous-clean-slate: the recursive pre-delete over FTP times
          # out the control socket on a populated dir. The action's sync-state
          # uploads only changed files instead.
          # Fresh state-name forces a full re-publish of every file once, to
          # recover from a stale/incorrect prior sync state.
          state-name: .sdp-deploy-state.json
          timeout: 120000
