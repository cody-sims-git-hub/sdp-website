name: Deploy to Hostinger
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lightweight gates — runs on PRs AND main pushes (no build here).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm audit --omit=dev --audit-level=critical

  # Build + publish to Hostinger — main push ONLY, never PRs or branches.
  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Build site
        run: npm run build
        env:
          # Public build-time config (baked into the client bundle). Repo
          # Variables, not secrets — these are not sensitive.
          VITE_CONTACT_API_URL: ${{ vars.VITE_CONTACT_API_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      - name: Deploy build to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # React Router v7 emits the static site to build/client (not dist/).
          local-dir: ./build/client/
          # simsdigitalpartners.com is served from its own domain folder; the FTP
          # user is jailed to /home/u811108183, so this targets the real docroot.
          server-dir: /domains/simsdigitalpartners.com/public_html/
          # Sync-state upload (no clean-slate: recursive FTP pre-delete times out).
          state-name: .sdp-deploy-state.json
          timeout: 120000
