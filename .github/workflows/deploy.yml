name: Deploy to Hostinger
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]
  pull_request:
    branches: [main]
    paths-ignore: ["**.md", "docs/**", "LICENSE"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Lightweight gates — runs on PRs AND main pushes (no build here).
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm audit --omit=dev --audit-level=critical

  # Build + publish to Hostinger — main push ONLY, never PRs or branches.
  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Build site
        run: npm run build
        env:
          # Public build-time config (baked into the client bundle). Repo
          # Variables, not secrets — these are not sensitive.
          VITE_CONTACT_API_URL: ${{ vars.VITE_CONTACT_API_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
      # Publish over SFTP (SSH) rather than plain FTP/FTPS — Hostinger's FTP
      # control socket times out intermittently from GitHub runners, whereas SSH
      # on port 65002 is reliable. rsync --delete keeps the docroot an exact
      # mirror of build/client (no stale-file accumulation, no sync-state file).
      # Host/port/user are not secrets (visible in the hPanel); only the private
      # key is sensitive, so it is the lone repo secret required: SSH_PRIVATE_KEY
      # (the private half of the key registered under SSH Access → SSH keys).
      - name: Deploy build to Hostinger over SFTP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: "5.183.10.166"
          SSH_PORT: "65002"
          SSH_USER: "u811108183"
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # build/client is the prerendered static site; mirror it into the docroot.
          # --delete prunes removed files; exclude .well-known so host-managed
          # ACME/SSL files are never wiped, and preview-sites/ so client preview
          # subdomains (public_html/preview-sites/<slug>) survive production deploys.
          rsync -az --delete --exclude='.well-known/' --exclude='preview-sites/' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=yes" \
            ./build/client/ \
            "$SSH_USER@$SSH_HOST:domains/simsdigitalpartners.com/public_html/"
