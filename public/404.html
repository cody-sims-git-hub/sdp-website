<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b101e" />
    <meta name="robots" content="noindex" />
    <title>Page not found | Sims Digital Partners</title>
    <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&family=Geist+Mono:wght@500&display=swap"
    />
    <style>
      :root {
        --bg: #0b101e;
        --fg: #f8fafc;
        --muted: #94a3b8;
        --primary: #4f8ff7;
        --border: #1e293b;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
      }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: "Geist", system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 5rem 1rem;
        gap: 0;
      }
      img {
        height: 2.5rem;
        width: auto;
      }
      .code {
        margin-top: 2rem;
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--primary);
      }
      h1 {
        margin: 0.75rem 0 0;
        font-size: clamp(2rem, 6vw, 3rem);
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 1rem 0 0;
        max-width: 28rem;
        color: var(--muted);
        line-height: 1.6;
      }
      a.button {
        margin-top: 2rem;
        display: inline-flex;
        align-items: center;
        border-radius: 0.5rem;
        background: var(--primary);
        color: #04122e;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.7rem 1.4rem;
        text-decoration: none;
        transition: opacity 0.15s ease;
      }
      a.button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <img src="/images/sdp-mark.png" alt="Sims Digital Partners" />
    <p class="code">404</p>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved.</p>
    <a class="button" href="/">Back to home</a>
  </body>
</html>
